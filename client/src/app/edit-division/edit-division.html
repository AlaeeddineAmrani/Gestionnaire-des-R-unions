<div class="form-page">
  <header class="page-topbar">
    <div class="topbar-left">
      <button class="btn-back" (click)="onCancel()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Divisions
      </button>
      <span style="color:var(--slate-300)">/</span>
      <span class="topbar-title">Modifier la Division</span>
    </div>
  </header>

  <div class="form-body">
    <div class="form-card">
      <p class="form-section-title">Modifier les informations</p>
      <form>
        <div class="form-group">
          <label>Nom de la division</label>
          <input type="text" name="nom_division" required placeholder="Nom de la division" [(ngModel)]="nom_division">
        </div>
        <p class="error-state" *ngIf="errorMessage">{{ errorMessage }}</p>
        <div class="form-actions">
          <button type="button" class="btn-back" (click)="onCancel()">Annuler</button>
          <button type="button" class="btn-primary" (click)="onSubmit()" [disabled]="isLoading">
            {{ isLoading ? 'Enregistrement...' : 'Sauvegarder' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

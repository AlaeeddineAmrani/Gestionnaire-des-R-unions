<div class="form-page">
  <header class="page-topbar">
    <div class="topbar-left">
      <button class="btn-back" (click)="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Réunions
      </button>
      <span style="color:var(--slate-300)">/</span>
      <span class="topbar-title">Nouvelle Réunion</span>
    </div>
  </header>

  <div class="form-body" style="max-width:920px">
    <div class="form-card">

      <!-- Section 1 : Infos de base -->
      <p class="form-section-title">Informations générales</p>
      <form>
        <div class="form-group">
          <label>Titre de la réunion</label>
          <input type="text" name="titre" required placeholder="ex: Réunion de coordination mensuelle" [(ngModel)]="titre">
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label>Date</label>
            <input type="date" name="date_reunion" required [(ngModel)]="date_reunion">
          </div>
          <div class="form-group">
            <label>ID de la Salle</label>
            <input type="number" name="id_salle" required placeholder="ex: 3" [(ngModel)]="id_salle">
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label>Heure de début</label>
            <input type="time" name="heure_debut" required [(ngModel)]="heure_debut">
          </div>
          <div class="form-group">
            <label>Heure de fin prévue</label>
            <input type="time" name="heure_fin_prevue" required [(ngModel)]="heure_fin_prevue">
          </div>
        </div>

        <div class="form-divider"></div>

        <!-- Section 2 : Ordre du jour -->
        <p class="form-section-title">Ordre du jour</p>
        <div style="display:flex; gap:0.6rem; margin-bottom:0.8rem">
          <input type="text" name="nouveauPointTitre" placeholder="Décrire un point à traiter..."
            [(ngModel)]="nouveauPointTitre"
            style="flex:1;padding:0.6rem 0.9rem;border:1.5px solid var(--slate-200);border-radius:var(--r-sm);font-family:inherit;font-size:0.9rem;outline:none">
          <button type="button" class="btn-primary" (click)="ajouterPoint()">+ Ajouter</button>
        </div>
        <ul class="points-list" *ngIf="pointsList.length > 0">
          <li class="point-item" *ngFor="let pt of pointsList; let i = index">
            <span class="point-num">{{ i + 1 }}</span>
            <span class="point-desc">{{ pt.titre_point }}</span>
            <button type="button" class="btn-danger" style="padding:0.3rem 0.7rem" (click)="retirerPoint(i)">✕</button>
          </li>
        </ul>

        <div class="form-divider"></div>

        <!-- Section 3 : Participants -->
        <p class="form-section-title">Participants</p>
        <div class="form-group">
          <label>Sélectionner les participants</label>
          <select name="selectedUserIds" multiple [(ngModel)]="selectedUserIds"
            style="height:140px">
            <option *ngFor="let user of users" [value]="user.id_utilisateur">
              {{ user.prenom }} {{ user.nom }}
            </option>
          </select>
          <small style="color:var(--slate-400);font-size:0.75rem;margin-top:0.3rem">
            Maintenez Ctrl (ou Cmd) pour sélectionner plusieurs personnes.
          </small>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-back" (click)="goBack()">Annuler</button>
          <button type="button" class="btn-primary" (click)="onSubmit()">Enregistrer la Réunion</button>
        </div>
      </form>
    </div>
  </div>
</div>

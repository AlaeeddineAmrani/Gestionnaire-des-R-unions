<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-circle">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2>Connexion</h2>
            <p>Accédez à votre espace de gestion</p>
        </div>
        
        <form action="#" method="POST" class="auth-form">
            <div class="form-group">
                <label>Adresse Email</label>
                <input type="email" name="email" required placeholder="nom@berkane.ma" [(ngModel)]="email">
            </div>

            <div class="form-group">
                <label>Mot de Passe</label>
                <input type="password" name="mot_de_passe" required placeholder="Votre mot de passe" [(ngModel)]="mot_de_passe">
            </div>

            <p class="error-state" *ngIf="errorMessage" style="margin-bottom:1.2rem; margin-top:0">{{ errorMessage }}</p>

            <button type="button" class="btn-primary" style="width:100%; padding:0.8rem; font-size:1rem" (click)="onSubmit()">Se Connecter</button>
        </form>
    </div>
</div>

<div class="form-page">
  <header class="page-topbar">
    <div class="topbar-left">
      <button class="btn-back" (click)="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Employés
      </button>
      <span style="color:var(--slate-300)">/</span>
      <span class="topbar-title">Modifier l'Employé</span>
    </div>
  </header>

  <div class="form-body">
    <div class="form-card">
      <p class="form-section-title">Modifier les informations</p>
      <form>
        <div class="form-grid-2">
          <div class="form-group">
            <label>Nom</label>
            <input type="text" name="nom" required placeholder="Nom" [(ngModel)]="nom">
          </div>
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" name="prenom" required placeholder="Prénom" [(ngModel)]="prenom">
          </div>
        </div>
        <div class="form-group">
          <label>Adresse email</label>
          <input type="email" name="email" required placeholder="email@berkane.ma" [(ngModel)]="email">
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" name="mot_de_passe" required placeholder="Nouveau mot de passe" [(ngModel)]="mot_de_passe">
        </div>
        <div class="form-group">
          <label>ID du service</label>
          <input type="number" name="id_service" required placeholder="ID du service" [(ngModel)]="id_service">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-back" (click)="goBack()">Annuler</button>
          <button type="button" class="btn-primary" (click)="onSubmit()">Sauvegarder</button>
        </div>
      </form>
    </div>
  </div>
</div>
